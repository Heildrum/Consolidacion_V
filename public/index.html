

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Consolidación de Ventas ML</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body class="bg-dark text-white d-flex align-items-center justify-content-center min-vh-100">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">

        <div class="card bg-dark text-white shadow-lg border border-secondary-subtle p-4 rounded-4">

          <!-- Header -->
          <div class="text-center mb-4">
            <h2 class="text-primary fw-bold mb-1">
              Consolidación de Ventas
            </h2>
            <h6 class="text-secondary">
              Mercado Libre
            </h6>
          </div>

          <!-- Descripción -->
          <p class="text-center text-secondary mb-4">
            Genera reportes consolidados o comparativos entre cuentas
            de Mercado Libre en un archivo Excel listo para análisis
            operativo y envío a proveedores.
          </p>

          <!-- Formulario -->
          <form id="formConsolidacion">

          
      
           
            <!-- Fechas -->
            <div class="row mb-4">
              <div class="col-12 col-md-6 mb-3 mb-md-0">
                <label class="form-label text-light fw-semibold">
                  Fecha inicio
                </label>
                <input
                  type="date"
                  id="fechaInicio"
                  class="form-control bg-dark text-white border-secondary"
                  required
                >
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label text-light fw-semibold">
                  Fecha fin
                </label>
                <input
                  type="date"
                  id="fechaFin"
                  class="form-control bg-dark text-white border-secondary"
                  required
                >
              </div>
            </div>

            <!-- Botón -->
            <div class="d-grid">
              <button type="submit" class="btn btn-light fw-bold py-2">
                 Generar reporte
              </button>
            </div>
          </form>

          <!-- Estado -->
          <div id="estado" class="mt-4 text-center"></div>

        </div>
      </div>
    </div>
  </div>

  <!-- JS -->
 
<script>
  const form = document.getElementById("formConsolidacion");
  const estado = document.getElementById("estado");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const fechaInicio = document.getElementById("fechaInicio").value;
    const fechaFin = document.getElementById("fechaFin").value;

    if (!fechaInicio || !fechaFin) {
      estado.innerHTML =
        "<span class='text-danger'>❌ Debes seleccionar ambas fechas</span>";
      return;
    }

    estado.innerHTML =
      "<span class='text-warning'>⏳ Generando reporte, por favor espera...</span>";

    try {
      const url = `/api/orders/export?from=${fechaInicio}&to=${fechaFin}`;

      // Dispara la descarga del Excel
      window.location.href = url;

      estado.innerHTML =
        "<span class='text-success'>✅ Reporte generado correctamente</span>";
    } catch (error) {
      console.error(error);
      estado.innerHTML =
        "<span class='text-danger'> Error al generar el reporte</span>";
    }
  });
</script>

</body>
</html>
